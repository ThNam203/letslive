name: letslive
description: Let's Live - Mobile App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.8.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0

  # State management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.1.0

  # Networking
  dio: ^5.7.0
  dio_cookie_manager: ^3.1.2
  cookie_jar: ^4.0.8

  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.2

  # UI
  forui: ^0.19.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Video player
  video_player: ^2.9.2
  chewie: ^1.8.5

  # WebSocket
  web_socket_channel: ^3.0.2

  # Google Sign-In
  google_sign_in: ^6.2.2

  # Utils
  flutter_dotenv: ^6.0.0
  json_annotation: ^4.11.0
  freezed_annotation: ^3.1.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.13.0
  freezed: ^3.2.5
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
